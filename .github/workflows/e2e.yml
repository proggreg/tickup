name: End-to-end tests
on: push
jobs:
  cypress-run:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      # Install npm dependencies, cache them correctly
      # and run all Cypress tests
      - name: install and build
        run: |
          npm i
          npm dev
      - name: Cypress run
        uses: cypress-io/github-action@v6